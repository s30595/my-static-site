<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Test JSON</title>
</head>
<body>

<h1>讀取 JSON 測試</h1>
<pre id="output"></pre>

<script>
fetch('./data.json')
  .then(res => res.json())
  .then(data => {
    document.getElementById('output').textContent =
      JSON.stringify(data, null, 2);
  })
  .catch(err => {
    console.error(err);
  });
</script>

</body>
</html>
